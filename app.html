const LS_TASKS  = 'mapap_tasks_v1';
const LS_TRACKS = 'mapap_tracks_v1';

function loadTasks() {
  try {
    const saved = localStorage.getItem(LS_TASKS);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return TASKS.map(t => ({...t}));
}
function saveTasks() {
  try { localStorage.setItem(LS_TASKS, JSON.stringify(state.tasks)); } catch(e) {}
}
function loadTracks() {
  try {
    const saved = localStorage.getItem(LS_TRACKS);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return TRACKS.map(t => ({...t}));
}
function saveTracks() {

}

function getUser(id) { return USERS.find(u => u.id === id); }
function assigneeName(id) { return getUser(id)?.name || '—'; }

function summaryRows() {
  return USERS.map(u => {
    const ut = state.tasks.filter(t => t.assignee === u.id);
    return {
      id: u.id, name: u.name,
      total:    ut.length,
      high:     ut.filter(t => t.priority === 1).length,
      medium:   ut.filter(t => t.priority === 2).length,
      inprog:   ut.filter(t => t.status === 'in_progress').length,
      done:     ut.filter(t => t.status === 'done').length,
    };
  });
}

function filteredTasks() {
  return state.tasks.filter(t => {
    if (state.filterAssignee && t.assignee !== state.filterAssignee) return false;
    if (state.filterDir    && t.dir !== state.filterDir)    return false;
    if (state.filterStatus && t.status !== state.filterStatus) return false;
    if (state.filterPriority && t.priority !== state.filterPriority) return false;
    return true;
  });
}

};

  1: { label:'🔴 Высокий', cls:'bg-red-100 text-red-700' },

};
function statusBadge(s) {
  const c = STATUS_CFG[s] || STATUS_CFG.new;
  return `<span class="badge ${c.cls}">${c.label}</span>`;
}
function priBadge(p) {
  const c = PRI_CFG[p] || PRI_CFG[2];
  return `<span class="badge ${c.cls}">${c.label}</span>`;
}
function dueLabel(d) {
  if (!d) return '<span class="text-gray-300 text-xs">—</span>';
  const diff = Math.ceil((new Date(d) - Date.now()) / 86400000);
  const label = new Date(d).toLocaleDateString('ru-RU');
  if (diff < 0) return `<span class="text-red-600 text-xs font-medium">${label} ⚠</span>`;
  if (diff <= 2) return `<span class="text-orange-500 text-xs font-medium">${label}</span>`;
  return `<span class="text-gray-500 text-xs">${label}</span>`;
}

function renderDashboard() {

              <td class="py-2">Итого</td>
              <td class="text-center py-2">${total}</td>
              <td class="text-center py-2 text-red-600">${high}</td>

        </table>

      <div class="card p-5">
        <h2 class="text-base font-semibold text-gray-800 mb-4">🔴 Высокий приоритет (текущие)</h2>
        <div class="space-y-2">

  return `

              <td class="text-center py-3 font-bold text-gray-800">${r.total}</td>
              <td class="text-center py-3 text-red-600">${r.high}</td>

            <td class="text-center py-3 text-red-600">${rows.reduce((a,r)=>a+r.high,0)}</td>

              <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px">Направление</label>
              <select class="input" id="edit-dir">
                ${DIRS.map(d=>`<option value="${d}"${t.dir===d?' selected':''}>${d}</option>`).join('')}
              </select>
            </div>
            <div>
              <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px">Тип</label>
              <select class="input" id="edit-type">
                ${TYPES.map(tp=>`<option value="${tp}"${t.type===tp?' selected':''}>${tp}</option>`).join('')}
              </select>
            </div>
            <div>
              <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px">Приоритет</label>
              <select class="input" id="edit-priority">
                <option value="1"${t.priority===1?' selected':''}>🔴 Высокий</option>
                <option value="2"${t.priority===2?' selected':''}>🟡 Средний</option>
                <option value="3"${t.priority===3?' selected':''}>Низкий</option>
              </select>
            </div>
            <div>
              <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px">Срок</label>
              <input class="input" type="date" id="edit-due" value="${t.due||''}" />
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;padding-top:4px">
            <div style="display:flex;gap:4px">${priBadge(t.priority)} ${statusBadge(t.status)}</div>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:16px;border-top:1px solid #e5e7eb">
          <button onclick="deleteTask(${t.id})" style="background:none;border:none;color:#ef4444;font-size:13px;cursor:pointer;padding:6px 0">🗑 Удалить задачу</button>
          <div style="display:flex;gap:12px">
            <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
            <button class="btn btn-primary" onclick="saveTask(${t.id})">Сохранить</button>
          </div>
        </div>
        ` : `
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
            <span style="font-size:13px;color:#6b7280">Текущий статус:</span>
            ${statusBadge(t.status)}
          </div>
          <div class="space-y-3">
            <div>
              <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px">Новый статус</label>
              <select class="input" id="new-status">
                <option value="">— выбрать —</option>
                <option value="new">Новая</option>
                <option value="in_progress">В работе</option>
                <option value="review">На проверке</option>
                ${state.user.role==='head'?'<option value="done">Готово</option>':''}
                <option value="blocked">Заблокировано</option>
              </select>
            </div>
            <div>
              <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px">Комментарий</label>
              <input class="input" id="status-comment" placeholder="Причина изменения (обязательно при блокировке)" />
            </div>
          </div>
          <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:24px;padding-top:16px;border-top:1px solid #e5e7eb">
            <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
            <button class="btn btn-primary" onclick="applyStatus(${t.id})">Применить</button>
          </div>
        </div>`}
      </div>
    </div>
  </div>`;
}

function renderCreateModal() {
  const DIRS = [...new Set(TASKS.map(x=>x.dir))];
  const TYPES = [...new Set(TASKS.map(x=>x.type))];
  return `
  <div class="modal-overlay" onclick="if(event.target===this){state.showCreateModal=false;render()}">
    <div class="modal" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #e5e7eb">
        <h2 style="font-size:16px;font-weight:600">Новая задача</h2>
        <button onclick="state.showCreateModal=false;render()" style="color:#9ca3af;font-size:22px;background:none;border:none;cursor:pointer">×</button>
      </div>
      <div style="padding:20px 24px">
        ${state.createError?`<div style="background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;padding:8px 12px;border-radius:8px;font-size:13px;margin-bottom:16px">${state.createError}</div>`:''}
        <div class="space-y-4">
          <div>
            <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px">Название *</label>
            <input class="input" id="create-title" placeholder="Название задачи" />
          </div>
          <div class="grid" style="grid-template-columns:1fr 1fr;gap:16px">
            ${state.user.role==='head'?`
            <div>
              <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px">Исполнитель</label>
              <select class="input" id="create-assignee">
                ${USERS.map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}
              </select>
            </div>`:''}
            <div>
              <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px">Направление</label>
              <select class="input" id="create-dir">
                ${DIRS.map(d=>`<option value="${d}">${d}</option>`).join('')}
              </select>
            </div>
            <div>
              <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px">Тип</label>
              <select class="input" id="create-type">
                ${TYPES.map(tp=>`<option value="${tp}">${tp}</option>`).join('')}
              </select>
            </div>
            <div>
              <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px">Приоритет</label>
              <select class="input" id="create-priority">
                <option value="1">🔴 Высокий</option>
                <option value="2" selected>🟡 Средний</option>
                <option value="3">Низкий</option>
              </select>
            </div>
            <div>
              <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px">Срок</label>
              <input class="input" type="date" id="create-due" />
            </div>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:24px;padding-top:16px;border-top:1px solid #e5e7eb">
          <button class="btn btn-secondary" onclick="state.showCreateModal=false;render()">Отмена</button>
          <button class="btn btn-primary" onclick="createTask()">Создать задачу</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = state.user ? renderApp() : renderLogin();
}

function navigate(page) { state.page = page; render(); }

function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const u = USERS.find(u=>u.email===email);
  if (!u || pass !== u.pass) { state.loginError='Неверный email или пароль'; render(); return; }
  state.user = u;
  state.loginError = '';
  // Reset filters for analyst
  if (u.role === 'analyst') state.filterAssignee = u.id;
  render();
}

function quickLogin(email) {
  document.getElementById('login-email').value = email;
  document.getElementById('login-pass').value = '';
  document.getElementById('login-pass').focus();
}

function doLogout() { state.user=null; state.page='dashboard'; render(); }

function openTask(id) { state.modal={taskId:id}; state.modalTab='details'; render(); }
function closeModal() { state.modal=null; render(); }

function saveTask(id) {
  const t = state.tasks.find(t=>t.id===id);
  const title = document.getElementById('edit-title').value.trim();
  if (!title) { alert('Название обязательно'); return; }
  t.title = title;
  t.assignee = Number(document.getElementById('edit-assignee').value);
  t.dir = document.getElementById('edit-dir').value;
  t.type = document.getElementById('edit-type').value;
  t.priority = Number(document.getElementById('edit-priority').value);
  t.due = document.getElementById('edit-due').value || null;
  saveTasks();
  closeModal();
}

function applyStatus(id) {
  const newStatus = document.getElementById('new-status').value;
  if (!newStatus) { alert('Выберите статус'); return; }
  if (newStatus==='blocked' && !document.getElementById('status-comment').value.trim()) {
    alert('Комментарий обязателен при блокировке'); return;
  }
  state.tasks.find(t=>t.id===id).status = newStatus;
  saveTasks();
  closeModal();
}

function createTask() {
  const title = document.getElementById('create-title').value.trim();
  if (!title) { state.createError='Название обязательно'; render(); return; }
  const newId = Math.max(...state.tasks.map(t=>t.id)) + 1;
  state.tasks.push({
    id: newId,
    title,
    assignee: state.user.role==='head' ? Number(document.getElementById('create-assignee')?.value||state.user.id) : state.user.id,
    dir:      document.getElementById('create-dir').value,
    type:     document.getElementById('create-type').value,
    priority: Number(document.getElementById('create-priority').value),
    status:   'new',
    due:      document.getElementById('create-due').value || null,
    urgent:   false,
  });
  state.showCreateModal=false;
  state.createError='';
  saveTasks();
  render();
}

function kanbanDrop(newStatus) {
  if (!state.kanbanDrag) return;
  const t = state.tasks.find(t=>t.id===state.kanbanDrag);
  if (t) {
    if (newStatus==='done' && state.user.role!=='head') { alert('Только руководитель может закрывать задачи'); return; }
    t.status = newStatus;
    saveTasks();
  }
  state.kanbanDrag = null;
  render();
}

function updateTrack(id, newStatus) {
  const t = state.tracks.find(t=>t.id===id);
  if (t) { t.status = newStatus; saveTracks(); }
}

function deleteTask(id) {
  if (!confirm('Удалить задачу? Это действие нельзя отменить.')) return;
  state.tasks = state.tasks.filter(t => t.id !== id);
  saveTasks();
  state.modal = null;
  render();
}

function exportCSV() {
  const rows = summaryRows();
  const lines = [
    'Сотрудник,Всего,Высокий,Средний,В работе,Готово',
    ...rows.map(r=>`${r.name},${r.total},${r.high},${r.medium},${r.inprog},${r.done}`),
  ];
  const blob = new Blob(['﻿'+lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`mapap_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  URL.revokeObjectURL(url);
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
